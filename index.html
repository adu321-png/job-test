<!DOCTYPE html>
<html lang="zh-CN">
<head>

        }
        body {

        }

            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            display: none;
        }
        .question-card.active {
            display: block;
        }
        .question-number {
            color: #f5576c;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            line-height: 1.5;
        }
        .option:hover {
            background: rgba(245,87,108,0.2);
            border-color: #f5576c;
            transform: translateX(5px);
        }
        .option.selected {
            background: linear-gradient(90deg, rgba(240,147,251,0.3) 0%, rgba(245,87,108,0.3) 100%);
            border-color: #f5576c;
            box-shadow: 0 0 15px rgba(245,87,108,0.3);
        }
        .option:active {
            transform: scale(0.98);
        }
        .result-card {
            display: none;
            text-align: center;
        }
        .result-card.active {
            display: block;
        }
        .result-type {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .result-subtitle {
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .indices {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .index-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
        }
        .index-value {
            font-size: 24px;
            font-weight: bold;
            color: #f5576c;
        }
        .index-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .radar-container {
            margin: 30px auto;
            max-width: 300px;
        }
        .analysis-section {
            text-align: left;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin: 20px 0;
        }
        .analysis-section h3 {
            color: #f093fb;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .analysis-section p {
            color: #ccc;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .warning-box {
            background: rgba(245,87,108,0.15);
            border: 1px solid rgba(245,87,108,0.3);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }
        .warning-box p {
            color: #f5576c;
            font-size: 14px;
        }
        .btn {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: #fff;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(240,147,251,0.4);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .start-screen, .result-screen {
            display: none;
        }
        .start-screen.active, .result-screen.active {
            display: block;
        }
        .start-info {
            background: rgba(255,255,255,0.05);

            margin-bottom: 10px;
        }
        .share-tip {
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>

<body>
    <div class="container">
        <!-- 开始页面 -->

            </div>

                <p>测试将分析你的职业困惑类型</p>
                <p class="share-tip">⚠️ 纯趣味测试，非科学评估，结果仅供参考</p>
            </div>
            <div style="text-align: center;">
                <button class="btn" onclick="startTest()">开始测试 →</button>

        <!-- 测试页面 -->

        <!-- 结果页面 -->

            <div class="radar-container">

            </div>

            <div class="analysis-section" id="analysisSection"></div>

            <div class="warning-box" id="warningBox"></div>

            <div style="text-align: center; margin: 30px 0;">
                <button class="btn" onclick="shareResult()">分享结果</button>
                <button class="btn btn-secondary" onclick="restartTest()">重新测试</button>
            </div>
        </div>
    </div>

                    { text: "C. 抓住时代机会", type: "opportunity" },
                    { text: "D. 创造独特职业模式", type: "integrate" }
                ]

        let currentQuestion = 0;
        let answers = {};

        function startTest() {
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('questionCard').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1}/30 题`;
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('progressFill').style.width = `${((currentQuestion + 1) / 30) * 100}%`;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            q.options.forEach((opt, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt.text;
                div.onclick = () => selectOption(index, opt.type);
                container.appendChild(div);
            });
        }

        function selectOption(index, type) {
            answers[currentQuestion] = type;

            // 标记选中状态
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });

            // 1秒后自动下一题
            setTimeout(() => {
                if (currentQuestion < questions.length - 1) {
                    currentQuestion++;
                    showQuestion();
                } else {
                    showResult();
                }
            }, 500);
        }

        function calculateResult() {
            const scores = {
                switch: 0,
                stay: 0,
                confused: 0,
                integrate: 0,
                explore: 0,
                opportunity: 0
            };

            Object.values(answers).forEach(type => {
                if (scores.hasOwnProperty(type)) {
                    scores[type]++;
                }
            });

            // 计算主要类型
            const mainTypes = ['switch', 'stay', 'confused', 'integrate'];
            let maxType = mainTypes[0];
            let maxScore = scores[mainTypes[0]];

            mainTypes.forEach(type => {
                if (scores[type] > maxScore) {
                    maxType = type;
                    maxScore = scores[type];
                }
            });

            return {
                primaryType: maxType,
                scores: scores
            };
        }

        function showResult() {

            // 渲染雷达图

                <h3>🔍 深度分析</h3>

        }

        function drawRadar(data) {
            const canvas = document.getElementById('radarCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = 150;
            const centerY = 150;
            const radius = 100;

            ctx.clearRect(0, 0, 300, 300);

            const labels = ['转型冲动', '深耕必要', '焦虑指数', '整合能力', '探索倾向', '机会感知'];
            const maxValue = 100;

            // 画背景圆
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            for (let i = 1; i <= 4; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius * i / 4, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 画轴线
            const angleStep = Math.PI * 2 / 6;
            for (let i = 0; i < 6; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.stroke();

                // 标签
                ctx.fillStyle = '#888';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(labels[i], centerX + Math.cos(angle) * (radius + 25), centerY + Math.sin(angle) * (radius + 25));
            }

            // 画数据区域
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const value = Math.min(data[i], maxValue);
                const x = centerX + Math.cos(angle) * (value / maxValue * radius);
                const y = centerY + Math.sin(angle) * (value / maxValue * radius);
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(240,147,251,0.3)';
            ctx.fill();
            ctx.strokeStyle = '#f093fb';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function shareResult() {

                navigator.share({

                    text: text,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(text + ' ' + window.location.href);
                alert('结果已复制到剪贴板！');
            }
        }

            document.getElementById('startScreen').classList.add('active');
